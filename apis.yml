name: Printi
kind: company
description: >-
  Printi is a Brazilian online commercial print marketplace founded in 2012 and
  based in Barueri / Sao Paulo, offering business cards, flyers, stationery,
  labels and stickers, packaging, brochures and folders, and promotional items
  through an online configurator that prices each job dynamically by format,
  paper, finish, and quantity. Printi is a Cimpress brand - Vistaprint took a
  minority stake in 2014 and Cimpress acquired a majority stake in 2020 - and
  sits in the same Cimpress portfolio as Vistaprint. Printi formerly published a
  public developer portal at developer.printi.com.br ("Printi API", hosted on
  ReadMe with a Run in Postman button) covering catalog, quoting, and order
  operations, but that portal is no longer resolvable and appears decommissioned.
  There is no live, documented, self-serve public API today; programmatic and
  reseller integration is now partner-gated, channeled through Cimpress's
  mass-customization / developer platform and Printi's "Comprar com Vendedor"
  reseller channel. The APIs below are modeled from the historical portal and
  observable storefront behavior - they are NOT sourced from a currently
  published public specification (see review.yml, endpointsModeled).
