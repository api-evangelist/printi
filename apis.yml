apis:
- aid: printi:printi-products-catalog-api
  name: Printi Products Catalog API
  tags:
  - Products
  - Catalog
  - Print
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.printi.com.br
  description: >-
    Modeled catalog surface for browsing Printi's printable product lines
    (business cards, flyers, stationery, labels, packaging, promotional items)
    and their configurable options - format, paper stock, finish, and quantity
    tiers. Inferred from the retired developer.printi.com.br portal and the live
    storefront configurator; endpoints are modeled, not sourced from a currently
    published public specification. Not verified against a live public spec.
  properties:
  - url: https://www.printi.com.br
    type: Website
- aid: printi:printi-quotes-pricing-api
  name: Printi Quotes and Pricing API
  tags:
  - Quotes
  - Pricing
  - Print
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.printi.com.br
  description: >-
    Modeled quoting surface that returns a price for a chosen product
    configuration - product, format, paper, finish, quantity, and delivery -
    mirroring the storefront's dynamic configurator (for example flyers from 250
    units). Printi prices per job at quote time rather than from a fixed public
    price list, so there is no public tiered plan catalog. Endpoints are modeled,
    not sourced from a currently published public specification.
  properties:
  - url: https://www.printi.com.br
    type: Website
- aid: printi:printi-orders-api
  name: Printi Orders API
  tags:
  - Orders
  - Fulfillment
  - Print
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.printi.com.br
  description: >-
    Modeled order surface for submitting an accepted quote as a print order,
    attaching artwork, and tracking production and delivery status. Inferred from
    the retired Printi developer portal and Printi's reseller ("Comprar com
    Vendedor") flow; in practice this capability is partner-gated today via
    Cimpress's platform. Endpoints are modeled, not sourced from a currently
    published public specification.
  properties:
  - url: https://www.printi.com.br
    type: Website
